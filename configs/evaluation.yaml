evaluation:
  run_id: "mv2026_cosmos_eval_001"

  datasets:
    mv2026:
      enabled: true
      raw_root: "data/raw/mv2026"
      canonical_root: "data/canonical/mv2026"
      split: "validation"
      use_gold_reports_after_prediction: true

    cosmos:
      enabled: true
      raw_root: "data/raw/cosmos"
      metadata: "data/raw/cosmos/test.jsonl"
      image_root: "data/raw/cosmos"
      canonical_root: "data/canonical/cosmos"
      split: "test"
      mode: "closed_world"

  memory_config: "configs/memory.yaml"

  protocol:
    name: "train_memory_freeze_test"
    # Optional paired memory-off run; disabled because it doubles evaluation cost.
    run_paired_memory_off_baseline: false
    allow_memory_retrieval: true
    allow_memory_update_train: true
    allow_memory_update_test: false
    gold_reading_stage: "after_prediction_only"
    # Consolidation cadence override for the training phase (defaults to
    # consolidation.every_n_cases from configs/memory.yaml when null).
    consolidate_every_n_cases: null
    # Training/bootstrap phase (memory retrieval + updates enabled).
    train:
      dataset: "mv2026"
      split: "train"
      raw_root: "data/raw/mv2026/training"
      limit: null
    # Frozen evaluation phases (retrieval from the snapshot, updates disabled).
    eval:
      - dataset: "mv2026"
        split: "validation"
      - dataset: "cosmos"
        split: "test"

  mv2026_metrics:
    final_label: true
    section_wise: true
    evidence_urls: true
    geolocation: true
    temporal: true
    entities: true
    report_structure: true
    hallucination: true
    llm_judge: false

  cosmos_metrics:
    accuracy: true
    balanced_accuracy: true
    macro_f1: true
    auroc: true
    average_precision: true
    ece: true
    brier: true

  thresholds:
    geolocation:
      within_100m: 100
      within_500m: 500
      within_1km: 1000

    temporal:
      exact_date_tolerance_hours: 24
      publication_time_tolerance_minutes: 60

    classification:
      ooc_threshold: 0.5
      abstain_lower: 0.45
      abstain_upper: 0.55
